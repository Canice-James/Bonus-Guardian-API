name: Build and Deploy

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Build the project
      - name: Build the project
        run: npm run build

      # Step 5: Upload the build artifact
      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: build
          path: |
            dist
            package.json
            package-lock.json
            tsconfig.json
            src/views
            src/public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Step 1: Download the build artifact
      - name: Download build artifact
        uses: actions/download-artifact@v3
        with:
          name: build

      # Step 2: Deploy to Dokploy
      - name: Deploy to Dokploy
        run: |
          curl -X POST http://152.53.177.163:3000/api/deploy/mAcycBR9N3ZzAB1NKnIjq \
            -H "Content-Type: application/json" \
            -d '{
              "artifact": "build",
              "message": "Deploy triggered by GitHub Actions"
            }'