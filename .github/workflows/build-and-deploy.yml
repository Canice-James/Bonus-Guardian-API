name: build and deploy (ghcr -> dokploy)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # owner/repo
  DOCKERFILE: Dockerfile

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # dokploy auto-deploy uses the webhook url from the app's Deployments tab
      # it redeploys when the tag matches what you configured in dokploy :contentReference[oaicite:1]{index=1}
      - name: trigger dokploy redeploy
        run: |
          curl -X POST http://152.53.177.163:3000/api/deploy/mAcycBR9N3ZzAB1NKnIjq \
            -H "Content-Type: application/json" \
            -d '{
              "artifact": "build",
              "message": "Deploy triggered by GitHub Actions"
            }'